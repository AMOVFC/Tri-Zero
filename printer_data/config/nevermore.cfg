[fan_generic nevermore]
pin: PB7
kick_start_time: 0.1
shutdown_speed: 0.0
max_power: 1.0


[temperature_sensor enclosure_air]
sensor_type: BME280
i2c_address: 119
i2c_mcu: host
i2c_bus: i2c.1
min_temp: 0
max_temp: 80

[gcode_macro AIR_STATUS]
description: Report enclosure air temperature, humidity, and pressure
gcode:
    {% set s = printer["bme280 enclosure_air"] %}
    RESPOND MSG="Air: {s.temperature|round(1)}C  RH: {s.humidity|round(1)}%  Pressure: {s.pressure|round(1)} hPa VOC: {s.voc|round(1)} PPM"


[gcode_macro NEVERMORE_ON]
description: Turn Nevermore fan fully on
gcode:
    SET_FAN_SPEED FAN=nevermore SPEED=1.0
    RESPOND MSG="Nevermore fan set to 100%"


[gcode_macro NEVERMORE_LOW]
description: Turn Nevermore fan to low speed
gcode:
    SET_FAN_SPEED FAN=nevermore SPEED=0.25
    RESPOND MSG="Nevermore fan set to 25%"


[gcode_macro NEVERMORE_MED]
description: Turn Nevermore fan to medium speed
gcode:
    SET_FAN_SPEED FAN=nevermore SPEED=0.70
    RESPOND MSG="Nevermore fan set to 70%"


[gcode_macro NEVERMORE_OFF]
description: Turn Nevermore fan off
gcode:
    SET_FAN_SPEED FAN=nevermore SPEED=0.0
    RESPOND MSG="Nevermore fan off"


[gcode_macro NEVERMORE_STATUS]
description: Report current Nevermore fan speed
gcode:
    {% set speed = (printer["fan_generic nevermore"].speed|float * 100)|int %}
    RESPOND MSG="Nevermore fan speed: {speed}%"