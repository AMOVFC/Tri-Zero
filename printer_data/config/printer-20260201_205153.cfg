#####################################################################
# Homing and Gantry Adjustment Routines
#####################################################################

[idle_timeout]
timeout: 1800

[homing_override]
axes: xyz
set_position_z: 10
gcode:
  G91
  G0 Z5 F2000 # Prevent nozzle from being too close to the heated bed by lifting it in advance
  G90
  {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}
  {% set e_target = printer.extruder.target %} # Save current temperature
  {% set fan_speed = printer.fan.speed %}      # Save current fan speed

  {% if home_all or 'X' in params %}
    _HOME_X
  {% endif %}
  
  {% if home_all or 'Y' in params %}
    _HOME_Y
  {% endif %}
  
  {% if home_all or 'Z' in params %}
        G0 X{printer.toolhead.axis_maximum.x / 2} Y{printer.toolhead.axis_maximum.y / 2} F6000
        {% if e_target >= 180 or printer.extruder.temperature >= 180 %}
            M106 S255 # Turn on fan
            M109 S180 # Ensure Z homing at 150°C
        {% endif %}
        M106 S0       # Turn off fan

        G91
        G1 Z5 F2000 # Prevent nozzle from being too close to the heated bed by lifting it in advance
        G90

        # Un-comment the following line if using both eddy and pressure sensor
        #SET_PIN PIN=_probe_ready VALUE=1 
        G28 Z 
        #SET_PIN PIN=_probe_ready VALUE=0
        G1 Z10 F2000
        
        M109 S{e_target}  # Restore temperature
        M106 S{fan_speed} # Restore fan speed
    {% endif %}

