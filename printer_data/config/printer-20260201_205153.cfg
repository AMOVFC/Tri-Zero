# [mcu display]
# serial: /dev/serial/by-id/usb-STMicroelectronics_STM32F042F6P6_CDC_in_FS_Mode_2066314B4E56-if00
# restart_method: command

# [display]
# lcd_type: sh1106
# i2c_mcu: display
# i2c_bus: i2c1a
# # Set the direction of the encoder wheel
# #   Standard: Right (clockwise) scrolls down or increases values. Left (counter-clockwise scrolls up or decreases values.
# encoder_pins: ^display:PA3, ^display:PA4
# #   Reversed: Right (clockwise) scrolls up or decreases values. Left (counter-clockwise scrolls down or increases values.
# #encoder_pins: ^display:PA4, ^display:PA3
# click_pin: ^!display:PA1
# kill_pin: ^!display:PA5
# #x_offset: 2
# #   Use X offset to shift the display towards the right. Value can be 0 to 3
# #vcomh: 0
# #   Set the Vcomh value on SSD1306/SH1106 displays. This value is
# #   associated with a "smearing" effect on some OLED displays. The
# #   value may range from 0 to 63. Default is 0.
# #   Adjust this value if you get some vertical stripes on your display. (31 seems to be a good value)

# [neopixel displayStatus]
# pin: display:PA0
# chain_count: 1
# color_order: GRB
# initial_RED: 0.2
# initial_GREEN: 0.05
# initial_BLUE: 0

# [bed_tilt]
# # Order matters: FL, FR, BM (back middle)
# points:
#   15, 15        # Front Right
#   105, 15       # Front left
#   60, 105      # Back Middle
# speed: 50
# horizontal_move_z: 5
# retries: 3
# retry_tolerance: 0.01

[z_tilt]
z_positions:
  150, -5
  -30, -5
  60, 150
points:
  115, 5        # Front right
  5, 5       # Front left
  60, 115      # Back Middle
speed: 100
horizontal_move_z: 5
retries: 3
retry_tolerance: 0.05

[bed_mesh]
speed: 100
horizontal_move_z: 3
mesh_min: 15, 15
mesh_max: 105, 105
probe_count: 5, 5
algorithm: bicubic
bicubic_tension: 0.2

# [bed_screws]
# screw1: 60,5
# screw1_name: front screw
# screw2: 5,115
# screw2_name: back left
# screw3: 115,115
# screw3_name: back right

[gcode_macro Bed_Level_Screws_Tune]
gcode:
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=60
    G28
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM=58 MAXIMUM=65
    BED_SCREWS_ADJUST
    TURN_OFF_HEATERS

[output_pin _probe_ready]
pin: PA10 #En #Enable pin
shutdown_value: 0
value:0

[probe]
pin: ^PA9 #out #Probe pin
x_offset: 0                  # X-axis - sensor offset relative to nozzle
y_offset: 0                  # Y-axis - sensor offset relative to nozzle
z_offset:0                   # Z-axis - sensor offset relative to nozzle
speed: 5                     # Leveling speed
samples: 3                   # Number of samples
samples_result: median       # Value selection method (default: median)
sample_retract_dist: 2       # Retraction distance for leveling
samples_tolerance: 0.05      # Sample tolerance (note that excessively small values may increase sampling times)
samples_tolerance_retries: 10 # Retry count when exceeding tolerance
activate_gcode:
        G4 P500
        SET_PIN PIN=_probe_ready VALUE=1
deactivate_gcode:
        SET_PIN PIN=_probe_ready VALUE=0  


