
[include mainsail.cfg]
[include KAMP_Settings.cfg]
[include macros.cfg]
[include TEST_SPEED.cfg]
[include timelapse.cfg]
[include shell_command.cfg]
# [include V0Display.cfg]
# This file contains common pin mappings for the BIGTREETECH SKR Pico V1.0
# To use this config, the firmware should be compiled for the RP2040 with
# USB communication.

# The "make flash" command does not work on the SKR Pico V1.0. Instead,
# after running "make", copy the generated "out/klipper.uf2" file
# to the mass storage device in RP2040 boot mode

## Voron Design VORON 0.2 SKR Pico V1.0 config

[respond]
[gcode_arcs]
[pause_resume]
[display_status]
[exclude_object]
[firmware_retraction]
[force_move]
enable_force_move : true

[include reshelper.cfg]

[mcu]
#####################################################################
# Obtain definition by "ls -l /dev/serial/by-id/"
#####################################################################
serial: /dev/serial/by-id/usb-Klipper_stm32h743xx_3A0046001451333135363231-if00
## serial: /dev/ttyAMA0 											# for UART connection
restart_method: command

[input_shaper]
shaper_type_x: mzv
shaper_freq_x: 68.8
damping_ratio_x: 0.055

shaper_type_y: 2hump_ei
shaper_freq_y: 63.4
damping_ratio_x: 0.055


[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 35000
max_z_velocity: 15
max_z_accel: 2000
square_corner_velocity: 12.0

#####################################################################
#      X/Y Stepper Settings
#####################################################################

[stepper_x]
step_pin: PB10
dir_pin: !PB11
enable_pin: !PG0
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200                                        # Set to 400 for 0.9° degree stepper motor, 200 is for 1.8° stepper motors
endstop_pin: tmc5160_stepper_x:virtual_endstop # Ensured virtual endstop is correctly updated
# endstop_pin: PC1
position_endstop: 120
position_max: 120
homing_speed: 80
homing_retract_dist: 0
homing_positive_dir: true

[tmc5160 stepper_x]
cs_pin: PE15
spi_bus: spi4
diag0_pin: ^!PG1
interpolate: false
run_current: 2 #max 2.5
sense_resistor: 0.075
stealthchop_threshold: 0
driver_SGT: 2    # this is set to 255 which is the MAX sensitivity for sensorless homing, you will need to tune this later

[stepper_y]
step_pin: PF15
dir_pin: !PF14
enable_pin: !PE9
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200                                        # Set to 400 for 0.9° degree stepper motor, 200 is for 1.8° stepper motors
endstop_pin: tmc5160_stepper_y:virtual_endstop # Ensured virtual endstop is correctly updated
# endstop_pin: PC2
position_endstop: 120
position_max: 120
homing_speed: 90
homing_retract_dist: 0
homing_positive_dir: true

[tmc5160 stepper_y]
cs_pin: PE11
spi_bus: spi4
diag0_pin: ^!PE10
interpolate: false
run_current: 2 #max 2.5
sense_resistor: 0.075
stealthchop_threshold: 0
driver_SGT: 2    # this is set to 255 which is the MAX sensitivity for sensorless homing, you will need to tune this later


#####################################################################
#   Z Stepper Settings
#####################################################################

[stepper_z] #front right
step_pin: PD4  
dir_pin: !PD3
enable_pin: !PD7  
# endstop_pin: ^PC3
endstop_pin: probe:z_virtual_endstop
rotation_distance: 32                                             
microsteps: 32
# position_endstop: 120
position_max: 120
position_min: -5
homing_speed: 5
second_homing_speed: 3.0
homing_retract_dist: 2.0
homing_positive_dir: false


[tmc2209 stepper_z]
uart_pin: PD5
#diag_pin: ^!PD6
interpolate: false
run_current: 1 #max 1.5
sense_resistor: 0.110
stealthchop_threshold: 0   

[stepper_z1]
step_pin: PC12
dir_pin: PC11
enable_pin: !PD2 
endstop_pin: probe:z_virtual_endstop
rotation_distance: 32                                                
microsteps: 32


[tmc2209 stepper_z1] # front left
uart_pin: PD0
#diag_pin: ^!PD1
interpolate: false
run_current: 1 #max 1.5
sense_resistor: 0.110
stealthchop_threshold: 0   

[stepper_z2] # back motor
step_pin: PC9
dir_pin: !PC8
enable_pin: !PC10  
endstop_pin: probe:z_virtual_endstop
rotation_distance: 32                                                
microsteps: 32


[tmc2209 stepper_z2]
uart_pin: PA8
#diag_pin: ^!PA15
interpolate: false
run_current: 1 #max 1.5
sense_resistor: 0.110
stealthchop_threshold: 0   



#####################################################################
#   Extruder
#####################################################################

# [mcu toolhead]
#################################################################################################################
################################## Orbittool O2S CONFIGURATION ##################################################
#################################################################################################################

#config file version v1.0.0
#release date: 17.07.2025


# End Stop pin PB0
# 24V ADC feedback pin PB1 - feature will be removed probably
# Z senzor Probe PB3
# Z Sensor servo PA15
# Orbiter filament sensor PA8
# Orbiter filament unload PA9

[mcu orbitoolO2S]
serial: /dev/serial/by-id/usb-Klipper_stm32f072xb_430038000C57475534393420-if00
restart_method: command

[extruder]
step_pin = orbitoolO2S:PB3
dir_pin = orbitoolO2S:PB4
enable_pin = !orbitoolO2S:PC14
microsteps = 32
rotation_distance = 4.69 # Orbiter v2.5
full_steps_per_rotation = 200
nozzle_diameter = 0.400
filament_diameter = 1.750
heater_pin = orbitoolO2S:PB9
sensor_pin = orbitoolO2S:PA1
pullup_resistor = 2200
# sensor_type = ATC Semitec 104GT-2 # update with correct sensor type PT1000 sensor are also suported
sensor_type: PT1000
min_temp = 0
max_temp = 300 # increase in case your hottend suports higher operating temperature
pressure_advance = 0.030  # user calibration needed
pressure_advance_smooth_time = 0.03 # user calibration needed
max_extrude_only_distance = 500.0
max_extrude_cross_section = 20
min_extrude_temp = 20
smooth_time = 0.5
max_power: 0.995 # limit heater power to 99.5% to enable autorecovery from short detection
control = pid
pid_Kp=30.353 
pid_Ki=4.216 
pid_Kd=54.636


[tmc2240 extruder] 
uart_pin: orbitoolO2S:PC13
interpolate: false
run_current: 0.85 # Orbiter v2.5
rref: 12000
stealthchop_threshold: 0
driver_TBL: 0
driver_TOFF: 3
driver_HEND: 8
driver_HSTRT: 7

# [stepper_x]
# endstop_pin: orbitoolO2S:PA2

# [heater_fan hotend_Fan]
# pin: !orbitoolO2S:PB15  
# tachometer_pin: orbitoolO2S:PB12
# tachometer_ppr: 2
# tachometer_poll_interval: 0.0005
# heater: extruder
# cycle_time: 0.0001 #10KHz PWM frecvency
# heater_temp: 75
# fan_speed: 1.0 # can be lowered to reduce fan noise
# hardware_pwm: false
# shutdown_speed: 0.0
# max_power: 1.0 # can be lowered to reduce fan noise

[heater_fan hotend_Fan]
pin: orbitoolO2S:PB15  
tachometer_pin: orbitoolO2S:PB12
tachometer_ppr: 2
tachometer_poll_interval: 0.0005
heater: extruder
cycle_time: 0.0001 #10KHz PWM frecvency
heater_temp: 50
fan_speed: 1.0 # can be lowered to reduce fan noise
hardware_pwm: true
shutdown_speed: 0.0
max_power: 1.0 # can be lower

[adc_temperature HOT_P]
temperature1:120 # value in Watts
#voltage1:1.32
voltage1:1.91 
temperature2:240 # value in Watts
voltage2:3.82 
#voltage2:2.64

[temperature_sensor Hotend_power]
sensor_pin: orbitoolO2S:PA0 
# sensor_type: PT1000
sensor_type: HOT_P



[firmware_retraction]
retract_length: 1.2 # user calibration needed
#   The length of filament (in mm) to retract when G10 is activated,
#   and to unretract when G11 is activated (but see
#   unretract_extra_length below). The default is 0 mm.
retract_speed: 120
#   The speed of retraction, in mm/s. The default is 20 mm/s.
unretract_extra_length: 0.0
#   The length (in mm) of *additional* filament to add when
#   unretracting.
unretract_speed: 120
#   The speed of unretraction, in mm/s. The default is 10 mm/s.

[neopixel OrbiLED]
pin: orbitoolO2S:PC15
chain_count: 2
color_order: GRB
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.1

